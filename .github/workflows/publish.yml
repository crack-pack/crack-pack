name: Publish to npm

# Publishes crack-pack to npm when a version tag (e.g. v0.1.0) is pushed.
# Uses npm "trusted publishing" via OIDC — no NPM_TOKEN secret, no token to
# rotate. Requires a Trusted Publisher configured on the npm package settings
# (GitHub Actions provider, repo crack-pack/crack-pack, workflow publish.yml).
# `npm publish` runs the package's prepublishOnly gate (clean → build → test).
on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for OIDC trusted publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24' # bundles npm 11.x
          registry-url: 'https://registry.npmjs.org'
      - run: npm install -g npm@latest # trusted publishing needs npm >= 11.5.1
      - run: npm ci
      - name: Verify tag matches package.json version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          echo "tag=$TAG  package.json=$PKG"
          test "$TAG" = "$PKG"
      - run: npm publish
